# =============================================================================
# Hermes Agent CLI Configuration
# =============================================================================
# Configured for Ollama Cloud provider with 2 models.
# Models ordered by usage weight: primary loop → auxiliary.
#
# Model switching via /model command:
#   /model deepseek-v4-flash — Default, fast agentic loop orchestrator (1M ctx, text)
#   /model qwen3.5:cloud     — Vision, Korean text, and summary tasks (256K ctx, text+image)
# =============================================================================

model:
  default: "deepseek-v4-flash"
  provider: "ollama-cloud"

# =============================================================================
# Fallback Chain
# =============================================================================
# If the primary model fails (rate limit, timeout, 5xx), Hermes switches to
# the next model in the chain. The chain is tried in order until one succeeds.
# =============================================================================
model_fallback:
  - model: "deepseek-v4-flash"
    provider: "ollama-cloud"
  - model: "qwen3.5:cloud"
    provider: "ollama-cloud"

# =============================================================================
# Context Compression
# =============================================================================
compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20
  protect_first_n: 3
  summary_model: "qwen3.5:cloud"

# =============================================================================
# Auxiliary Models
# =============================================================================
# Vision (image analysis, browser screenshots), web extraction, and
# compression summaries all use qwen3.5:cloud for its multimodal
# capability and strong Korean language support.
# =============================================================================
auxiliary:
  vision:
    provider: "ollama-cloud"
    model: "qwen3.5:cloud"
  web_extract:
    provider: "ollama-cloud"
    model: "qwen3.5:cloud"
  compression:
    provider: "ollama-cloud"
    model: "qwen3.5:cloud"

# =============================================================================
# Terminal Configuration
# =============================================================================
terminal:
  backend: local
  timeout: 120

# =============================================================================
# Gateway
# =============================================================================
gateway:
  enabled: false